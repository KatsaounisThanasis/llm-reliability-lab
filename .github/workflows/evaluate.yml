name: LLM Reliability Evaluation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Type-check, Unit tests
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q

  eval:
    name: Live LLM Evaluation Gate
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect provider key
        id: gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "::notice::GROQ_API_KEY secret is not configured — skipping live evaluation. Lint/type-check/tests still gate the build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run LLM Evaluation
        if: steps.gate.outputs.skip != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LITELLM_MODEL: "groq/llama-3.3-70b-versatile,groq/llama-3.1-8b-instant"
          ACCURACY_THRESHOLD: 0.8
          LATENCY_THRESHOLD: 3.0
          COST_THRESHOLD: 0.001
          ERROR_RATE_THRESHOLD: 0.0
        run: |
          mkdir -p reports
          python src/eval_runner.py \
            --models "$LITELLM_MODEL" \
            --accuracy-threshold "$ACCURACY_THRESHOLD" \
            --latency-threshold "$LATENCY_THRESHOLD" \
            --cost-threshold "$COST_THRESHOLD" \
            --error-rate-threshold "$ERROR_RATE_THRESHOLD"

      - name: Upload Evaluation Report
        if: steps.gate.outputs.skip != 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: reports/*.json
          retention-days: 14
