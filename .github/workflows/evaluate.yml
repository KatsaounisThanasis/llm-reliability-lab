name: LLM Reliability Evaluation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Run Linting and Type Checking
        run: |
          ruff check src tests
          mypy src

      - name: Run LLM Evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_MODEL: gemini/gemini-2.5-flash-lite
          ACCURACY_THRESHOLD: 0.8
          LATENCY_THRESHOLD: 10.0
          COST_THRESHOLD: 0.001
          ERROR_RATE_THRESHOLD: 0.0
        run: |
          mkdir -p reports
          python src/eval_runner.py \
            --models "$LITELLM_MODEL" \
            --accuracy-threshold "$ACCURACY_THRESHOLD" \
            --latency-threshold "$LATENCY_THRESHOLD" \
            --cost-threshold "$COST_THRESHOLD" \
            --error-rate-threshold "$ERROR_RATE_THRESHOLD"

      - name: Upload Evaluation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports
          path: reports/*.json
          retention-days: 14
